<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBox Widget</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --naranja: #FF6B2B;
            --naranja-hover: #E55A1B;
            --naranja-light: #FFF0E9;
            --azul: #0D1B3E;
            --azul-mid: #1A2F5E;
            --azul-light: #2A4080;
            --blanco: #FFFFFF;
            --gris-claro: #F5F6FA;
            --gris-borde: #E8EAF0;
            --sombra: 0 8px 32px rgba(13, 27, 62, 0.18);
            --radio: 18px;
            --radio-burbuja: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #eef0f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* ─── BOTÓN FLOTANTE ─── */
        #chat-launcher {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: var(--naranja);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 107, 43, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.25s cubic-bezier(.34, 1.56, .64, 1), background 0.2s;
            z-index: 9999;
        }

        #chat-launcher:hover {
            background: var(--naranja-hover);
            transform: scale(1.08);
        }

        #chat-launcher svg {
            transition: transform 0.3s ease;
        }

        /* ─── VENTANA CHAT ─── */
        #chat-window {
            position: fixed;
            bottom: 90px;
            left: 20px;
            width: 300px;
            max-height: 420px;
            background: var(--blanco);
            border-radius: var(--radio);
            box-shadow: var(--sombra);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 9998;
            transform: translateY(0) scale(1);
            opacity: 1;
            pointer-events: all;
            transition: transform 0.3s cubic-bezier(.34, 1.56, .64, 1), opacity 0.25s ease;
        }

        #chat-window.hidden {
            transform: translateY(20px) scale(0.96);
            opacity: 0;
            pointer-events: none;
        }

        /* ─── HEADER ─── */
        .chat-header {
            background: linear-gradient(135deg, var(--azul) 0%, var(--azul-mid) 60%, var(--azul-light) 100%);
            padding: 18px 20px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }


        .avatar {
            width: 44px;
            height: 44px;
            background: var(--naranja);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(255, 107, 43, 0.4);
        }

        .header-info {
            flex: 1;
            z-index: 1;
        }

        .header-info .nombre {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 800;
            color: var(--blanco);
            letter-spacing: 0.3px;
        }

        .header-info .estado {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 3px;
        }

        .header-info .estado .dot {
            width: 7px;
            height: 7px;
            background: #4FFFB0;
            border-radius: 50%;
            box-shadow: 0 0 6px #4FFFB0;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .header-info .estado span {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
        }

        .btn-cerrar {
            background: rgba(255, 255, 255, 0.12);
            border: none;
            border-radius: 10px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 1;
        }

        .btn-cerrar:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        /* ─── MENSAJES ─── */
        .chat-mensajes {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--gris-claro);
            min-height: 200px;
            max-height: 260px;
        }

        .chat-mensajes::-webkit-scrollbar {
            width: 4px;
        }

        .chat-mensajes::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-mensajes::-webkit-scrollbar-thumb {
            background: var(--gris-borde);
            border-radius: 4px;
        }

        /* Burbuja */
        .burbuja {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            animation: fadeUp 0.3s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .burbuja.bot {
            justify-content: flex-start;
        }

        .burbuja.usuario {
            justify-content: flex-end;
        }

        .burbuja-mini-avatar {
            width: 28px;
            height: 28px;
            background: var(--naranja);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .burbuja-texto {
            max-width: 78%;
            padding: 11px 14px;
            border-radius: var(--radio-burbuja);
            font-size: 13.5px;
            line-height: 1.55;
            font-weight: 400;
        }

        .burbuja.bot .burbuja-texto {
            background: var(--blanco);
            color: var(--azul);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(13, 27, 62, 0.08);
        }

        .burbuja.usuario .burbuja-texto {
            background: var(--naranja);
            color: var(--blanco);
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(255, 107, 43, 0.3);
        }

        .burbuja-hora {
            font-size: 10.5px;
            color: #9CA3AF;
            margin-top: 2px;
            padding: 0 2px;
            align-self: flex-end;
        }

        .burbuja.usuario .burbuja-hora {
            text-align: right;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 14px;
            background: var(--blanco);
            border-radius: var(--radio-burbuja);
            border-bottom-left-radius: 4px;
            width: fit-content;
            box-shadow: 0 2px 8px rgba(13, 27, 62, 0.08);
        }

        .typing span {
            width: 7px;
            height: 7px;
            background: var(--naranja);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-5px);
            }
        }

        /* ─── INPUT ─── */
        .chat-footer {
            padding: 14px 16px;
            background: var(--blanco);
            border-top: 1px solid var(--gris-borde);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: var(--gris-claro);
            border: 1.5px solid var(--gris-borde);
            border-radius: 12px;
            padding: 10px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            color: var(--azul);
            outline: none;
            resize: none;
            max-height: 80px;
            transition: border-color 0.2s;
            line-height: 1.4;
        }

        .chat-input::placeholder {
            color: #B0B7C9;
        }

        .chat-input:focus {
            border-color: var(--naranja);
            background: var(--blanco);
        }

        .btn-enviar {
            width: 42px;
            height: 42px;
            background: var(--naranja);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s;
            box-shadow: 0 3px 10px rgba(255, 107, 43, 0.35);
        }

        .btn-enviar:hover {
            background: var(--naranja-hover);
            transform: scale(1.05);
        }

        .btn-enviar:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body>

    <!-- BOTÓN FLOTANTE -->
    <button id="chat-launcher" aria-label="Abrir chat">
        <!-- Icono chat -->
        <svg id="icon-chat" width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white" />
        </svg>
    </button>

    <!-- VENTANA CHAT -->
    <div id="chat-window" role="dialog" aria-label="Chat de soporte">

        <!-- HEADER -->
        <div class="chat-header">
            <div class="avatar">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12C2 14.2 2.74 16.23 4 17.87V22L8.1 20.26C9.31 20.73 10.63 21 12 21C17.52 21 22 16.52 22 11C22 6.48 17.52 2 12 2Z"
                        fill="white" />
                    <circle cx="8.5" cy="11.5" r="1.5" fill="#FF6B2B" />
                    <circle cx="12" cy="11.5" r="1.5" fill="#FF6B2B" />
                    <circle cx="15.5" cy="11.5" r="1.5" fill="#FF6B2B" />
                </svg>
            </div>
            <div class="header-info">
                <div class="nombre">Búsqueda</div>
            </div>
            <button class="btn-cerrar" id="btn-cerrar" aria-label="Cerrar chat">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M1 1L13 13M13 1L1 13" stroke="white" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
        </div>

        <!-- MENSAJES -->
        <div class="chat-mensajes" id="chat-mensajes">
            <div class="burbuja bot" id="msg-bienvenida">
                <div class="burbuja-mini-avatar">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12C2 14.2 2.74 16.23 4 17.87V22L8.1 20.26C9.31 20.73 10.63 21 12 21C17.52 21 22 16.52 22 11C22 6.48 17.52 2 12 2Z"
                            fill="white" />
                    </svg>
                </div>
                <div>
                    <div class="burbuja-texto">👋 ¡Hola! ¿En qué puedo ayudarte hoy?</div>
                    <div class="burbuja-hora" id="hora-bienvenida"></div>
                </div>
            </div>
        </div>

        <!-- INPUT -->
        <div class="chat-footer">
            <textarea class="chat-input" id="chat-input" placeholder="Escribe tu mensaje..." rows="1"
                aria-label="Escribe un mensaje"></textarea>
            <button class="btn-enviar" id="btn-enviar" aria-label="Enviar mensaje">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="white" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
        </div>

    </div>

    <script>
        window.addEventListener('load', function () {
            var launcher = document.getElementById('chat-launcher');
            var chatWindow = document.getElementById('chat-window');
            var btnCerrar = document.getElementById('btn-cerrar');
            var mensajesEl = document.getElementById('chat-mensajes');
            var inputEl = document.getElementById('chat-input');
            var btnEnviar = document.getElementById('btn-enviar');

            function horaActual() {
                return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            }
            document.getElementById('hora-bienvenida').textContent = horaActual();

            launcher.classList.add('open');

            launcher.addEventListener('click', function () {
                var estaCerrado = chatWindow.classList.toggle('hidden');
                launcher.classList.toggle('open', !estaCerrado);
            });

            btnCerrar.addEventListener('click', function (e) {
                e.stopPropagation();
                chatWindow.classList.add('hidden');
                launcher.classList.remove('open');
            });

            inputEl.addEventListener('input', function () {
                inputEl.style.height = 'auto';
                inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
            });

            inputEl.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    enviarMensaje();
                }
            });

            btnEnviar.addEventListener('click', enviarMensaje);

            function agregarMensaje(texto, tipo) {
                var hora = horaActual();
                var wrap = document.createElement('div');
                wrap.className = 'burbuja ' + tipo;
                wrap.innerHTML = '<div><div class="burbuja-texto">' + texto + '</div><div class="burbuja-hora">' + hora + '</div></div>';
                mensajesEl.appendChild(wrap);
                mensajesEl.scrollTop = mensajesEl.scrollHeight;
            }

            function enviarMensaje() {
                var texto = inputEl.value.trim();
                if (!texto) return;
                agregarMensaje(texto, 'usuario');
                inputEl.value = '';
                inputEl.style.height = 'auto';
                // Aquí se conectará la IA próximamente
            }
        });
    </script>
</body>

</html>
