<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBox Widget</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="chatbox.css">
</head>

<body>

    <button id="chat-launcher" aria-label="Abrir chat">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white" />
        </svg>
    </button>

    <div id="chat-window" class="hidden" role="dialog" aria-label="Chat de soporte">
        <div class="chat-header">
            <div class="avatar">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12C2 14.2 2.74 16.23 4 17.87V22L8.1 20.26C9.31 20.73 10.63 21 12 21C17.52 21 22 16.52 22 11C22 6.48 17.52 2 12 2Z"
                        fill="white" />
                    <circle cx="8.5" cy="11.5" r="1.5" fill="#FF6B2B" />
                    <circle cx="12" cy="11.5" r="1.5" fill="#FF6B2B" />
                    <circle cx="15.5" cy="11.5" r="1.5" fill="#FF6B2B" />
                </svg>
            </div>
            <div class="header-info">
                <div class="nombre">Búsqueda</div>
            </div>
            <button class="btn-cerrar" id="btn-cerrar" aria-label="Cerrar chat">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M1 1L13 13M13 1L1 13" stroke="white" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
        </div>
        <div class="chat-mensajes" id="chat-mensajes">
            <div class="burbuja bot" id="msg-bienvenida">
                <div class="burbuja-mini-avatar">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12C2 14.2 2.74 16.23 4 17.87V22L8.1 20.26C9.31 20.73 10.63 21 12 21C17.52 21 22 16.52 22 11C22 6.48 17.52 2 12 2Z"
                            fill="white" />
                    </svg>
                </div>
                <div>
                    <div class="burbuja-texto">👋 ¡Hola! ¿En qué puedo ayudarte hoy?</div>
                    <div class="burbuja-hora" id="hora-bienvenida"></div>
                </div>
            </div>
        </div>
        <div class="chat-footer">
            <textarea class="chat-input" id="chat-input" placeholder="Escribe tu mensaje..." rows="1"
                aria-label="Escribe un mensaje"></textarea>
            <button class="btn-enviar" id="btn-enviar" aria-label="Enviar mensaje">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="white" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
        </div>
    </div>

    <script src="chatbox.js"></script>
</body>

</html>
