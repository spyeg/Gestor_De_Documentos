<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBox - Couce Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Syne:wght@800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="chatbox.css">
</head>

<body>

    <button id="chat-launcher" aria-label="Asistente Virtual Couce Consulting"
        title="Asistente Virtual Couce Consulting">
        <svg width="34" height="34" viewBox="0 0 32 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Imagen robot -->
            <line x1="16" y1="0" x2="16" y2="4" stroke="white" stroke-width="2" stroke-linecap="round" />
            <circle cx="16" cy="0" r="1.5" fill="white" />
            <rect x="5" y="4" width="22" height="15" rx="4" fill="white" />
            <circle cx="11" cy="11" r="3" fill="#FF6B2B" />
            <circle cx="21" cy="11" r="3" fill="#FF6B2B" />
            <circle cx="11" cy="11" r="1.2" fill="white" />
            <circle cx="21" cy="11" r="1.2" fill="white" />
            <rect x="10" y="15" width="12" height="2" rx="1" fill="#FF6B2B" />
            <rect x="2" y="8" width="3" height="5" rx="1.5" fill="white" opacity="0.7" />
            <rect x="27" y="8" width="3" height="5" rx="1.5" fill="white" opacity="0.7" />
        </svg>
    </button>

    <div id="chat-window" class="hidden">
        <div style="height:6px;background:var(--naranja);width:100%;"></div>
        <div class="chat-header">
            <div class="avatar"><img src="logo_couce_pequeño.png" width="24" height="24" style="object-fit:contain;">
            </div>
            <div class="nombre">Asistente</div>
            <div class="header-acciones">
                <button class="btn-cerrar" id="btn-cerrar">×</button>
            </div>
        </div>
        <div class="chat-mensajes" id="chat-mensajes">
            <div class="burbuja bot">
                <div>
                    <div class="burbuja-texto">👋 ¡Hola! ¿Cómo puedo ayudarte?</div>
                    <div class="burbuja-hora" id="hora-bienvenida"></div>
                </div>
            </div>
        </div>
        <div class="chat-footer">
            <div class="chat-footer-inner">
                <textarea class="chat-input" id="chat-input" placeholder="Escribe..." rows="1"
                    maxlength="500"></textarea>
                <span id="char-contador">0/500</span>
            </div>
            <button class="btn-enviar" id="btn-enviar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" />
                </svg>
            </button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="chatbox.js"></script>
</body>

</html>
