<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBox - Couce Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Syne:wght@800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="chatbox.css">
</head>

<body>

    <button id="chat-launcher" aria-label="Abrir chat">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" />
        </svg>
    </button>

    <div id="chat-window" class="hidden">
        <div class="chat-header">
            <div class="avatar"><svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12C2 14.2 2.74 16.23 4 17.87V22L8.1 20.26C9.31 20.73 10.63 21 12 21C17.52 21 22 16.52 22 11C22 6.48 17.52 2 12 2Z" />
                </svg></div>
            <div class="nombre">Asistente</div>
            <button class="btn-cerrar" id="btn-cerrar">×</button>
        </div>
        <div class="chat-mensajes" id="chat-mensajes">
            <div class="burbuja bot">
                <div>
                    <div class="burbuja-texto">👋 ¡Hola! ¿Cómo puedo ayudarte?</div>
                    <div class="burbuja-hora" id="hora-bienvenida"></div>
                </div>
            </div>
        </div>
        <div class="chat-footer">
            <textarea class="chat-input" id="chat-input" placeholder="Escribe..." rows="1"></textarea>
            <button class="btn-enviar" id="btn-enviar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" />
                </svg>
            </button>
        </div>
    </div>

    <script src="chatbox.js"></script>
</body>

</html>
